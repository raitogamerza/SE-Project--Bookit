version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bookit_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # Note: Make sure to map necessary env variables here if running in production
      # - SUPABASE_URL=${SUPABASE_URL}
      # - SUPABASE_KEY=${SUPABASE_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bookit_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
